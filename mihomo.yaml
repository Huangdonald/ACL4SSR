ipv6: false
log-level: silent
allow-lan: true

geodata-mode: true
geosite-matcher: mph
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip-only-cn-private.dat
  geosite: https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat

proxy-providers:
  ovmvo:
    type: http
    path: ./proxy_providers/ovmvo.yaml
    url: https://fastly.jsdelivr.net/gh/ovmvo/FreeSub@main/sub/permanent/mihomo.yaml
    interval: 3600
    override:
      skip-cert-verify: true
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 600
      timeout: 1000

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🔯 故障转移
      - 🔮 负载均衡
      - ovmvo
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - others
      - 🚀 手动切换
      - DIRECT

  - name: 🚀 手动切换
    type: select
    include-all-providers: true

  - name: ♻️ 自动选择
    type: url-test
    include-all-providers: true

  - name: 🔯 故障转移
    type: fallback
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 1000
    include-all-providers: true

  - name: 🔮 负载均衡
    type: load-balance
    strategy: consistent-hashing
    include-all-providers: true

  - name: ovmvo
    type: url-test
    use:
      - ovmvo

  - name: 🇭🇰 香港节点
    type: url-test
    filter: "港|HK|hk|Hong Kong|HongKong|hongkong|🇭🇰"
    include-all-providers: true

  - name: 🇯🇵 日本节点
    type: url-test
    filter: "日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan|🇯🇵"
    include-all-providers: true

  - name: 🇺🇸 美国节点
    type: url-test
    filter: "美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|🇺🇸"
    include-all-providers: true

  - name: 🇹🇼 台湾节点
    type: url-test
    filter: "台|新北|彰化|TW|Taiwan|🇹🇼"
    include-all-providers: true

  - name: 🇸🇬 狮城节点
    type: url-test
    filter: "新加坡|坡|狮城|SG|Singapore|🇸🇬"
    include-all-providers: true

  - name: 🇰🇷 韩国节点
    type: url-test
    filter: "KR|Korea|KOR|首尔|韩|韓|🇰🇷"
    include-all-providers: true

  - name: others
    type: url-test
    exclude-filter: "港|HK|hk|Hong Kong|HongKong|hongkong|🇭🇰|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan|🇯🇵|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|🇺🇸|台|新北|彰化|TW|Taiwan|🇹🇼|新加坡|坡|狮城|SG|Singapore|🇸🇬|KR|Korea|KOR|首尔|韩|韓|🇰🇷"
    include-all-providers: true

rules:
  - GEOSITE,private,DIRECT
  - GEOSITE,github,🚀 节点选择
  - GEOSITE,microsoft-dev,🚀 节点选择
  - GEOSITE,google,🚀 节点选择
  - GEOSITE,microsoft,DIRECT
  - GEOSITE,geolocation-!cn,🚀 节点选择
  - GEOSITE,CN,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,CN,DIRECT
  - MATCH,🚀 节点选择
